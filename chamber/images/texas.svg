<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600" role="img" aria-label="Texas Flag">
  <!-- Background -->
  <rect width="900" height="600" fill="#FFFFFF"></rect>

  <!-- Left blue field (1/3 width) -->
  <rect x="0" y="0" width="300" height="600" fill="#2E4057"></rect>

  <!-- Right side stripes (2/3 width): white top, red bottom -->
  <rect x="300" y="0" width="600" height="300" fill="#FFFFFF"></rect>
  <rect x="300" y="300" width="600" height="300" fill="#A23B3B"></rect>

  <!-- Star centered in blue field -->
  <!-- Star is sized/positioned to match common Texas flag proportions -->
  <polygon fill="#FFFFFF" points="
    150,135
    170.7,207.7
    246,207.7
    184.5,250.6
    205.9,323.3
    150,278.5
    94.1,323.3
    115.5,250.6
    54,207.7
    129.3,207.7
  "></polygon>
</svg>