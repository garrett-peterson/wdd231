<!-- list-outline.svg  |  stroke color: #2E4057  -->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" aria-label="List view">
  <!-- outer rounded square -->
  <rect x="4" y="4" width="56" height="56" rx="10" stroke="#2E4057" stroke-width="4"/>

  <!-- bullets + lines (all outlines) -->
  <g stroke="#2E4057" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- row 1 -->
    <circle cx="18" cy="22" r="3"/>
    <rect x="28" y="18" width="24" height="6" rx="3.5"/>
    <!-- row 2 -->
    <circle cx="18" cy="32" r="3"/>
    <rect x="28" y="28" width="24" height="6" rx="3.5"/>
    <!-- row 3 -->
    <circle cx="18" cy="42" r="3"/>
    <rect x="28" y="38" width="24" height="6" rx="3.5"/>
  </g>
</svg>